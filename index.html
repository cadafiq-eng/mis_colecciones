<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

  <!-- PWA / iOS -->
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MisColecciones"/>
  <meta name="application-name" content="MisColecciones"/>
  <meta name="theme-color" content="#0f3460" id="themeColorMeta"/>
  <meta name="description" content="Guarda y organiza tus páginas web favoritas en colecciones"/>

  <!-- iOS splash screens (portrait) -->
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="apple-touch-startup-image" href="icons/icon-512.png"/>

  <link rel="manifest" href="manifest.json"/>
  <title>MisColecciones</title>

  <style>
    /* ============================================================
       DESIGN TOKENS — DARK MODE (default)
       ============================================================ */
    :root {
      --bg:        #0e1117;
      --surface:   #161b27;
      --surface2:  #1e2535;
      --surface3:  #252d42;
      --accent:    #e94560;
      --accent-soft: rgba(233,69,96,.15);
      --accent2:   #533483;
      --text:      #edf0f7;
      --text2:     #8892a8;
      --border:    #252d42;
      --success:   #4ecca3;
      --warning:   #f7b731;
      --error:     #e94560;
      --radius:    14px;
      --radius-sm: 8px;
      --shadow:    0 4px 24px rgba(0,0,0,.45);
      --shadow-sm: 0 2px 10px rgba(0,0,0,.3);
      --header-grad: linear-gradient(135deg,#0f3460 0%,#533483 100%);
      /* iOS safe areas */
      --sat: env(safe-area-inset-top,    0px);
      --sab: env(safe-area-inset-bottom, 0px);
      --sal: env(safe-area-inset-left,   0px);
      --sar: env(safe-area-inset-right,  0px);
    }

    /* ============================================================
       LIGHT MODE
       ============================================================ */
    [data-theme="light"] {
      --bg:        #f2f5fb;
      --surface:   #ffffff;
      --surface2:  #e8edf8;
      --surface3:  #dce4f5;
      --accent:    #e94560;
      --accent-soft: rgba(233,69,96,.10);
      --accent2:   #533483;
      --text:      #0e1117;
      --text2:     #5a6680;
      --border:    #ccd5e8;
      --success:   #27ae60;
      --warning:   #e67e22;
      --error:     #c0392b;
      --shadow:    0 4px 24px rgba(0,0,0,.10);
      --shadow-sm: 0 2px 10px rgba(0,0,0,.06);
    }

    /* ============================================================
       RESET & BASE
       ============================================================ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    html {
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                   'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      height: -webkit-fill-available;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      margin: 0 auto;
      position: relative;
      transition: background .25s, color .25s;
    }

    /* ============================================================
       APP WRAPPER
       ============================================================ */
    .app-wrapper {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      padding-top: var(--sat);
      padding-left: var(--sal);
      padding-right: var(--sar);
    }

    /* ============================================================
       HEADER
       ============================================================ */
    .app-header {
      background: var(--header-grad);
      padding: 13px 14px 11px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      box-shadow: 0 2px 16px rgba(0,0,0,.4);
      position: relative;
      z-index: 10;
    }
    .hdr-back {
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.18);
      border: none;
      color: #fff;
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      flex-shrink: 0;
      transition: background .2s;
    }
    .hdr-back.show { display: flex; }
    .hdr-back:active { background: rgba(255,255,255,.32); }
    .hdr-title {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sync-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      padding: 4px 8px;
      border-radius: 20px;
      flex-shrink: 0;
      white-space: nowrap;
      transition: all .35s;
      background: rgba(78,204,163,.2);
      color: #4ecca3;
    }
    .sync-pill.syncing { background: rgba(247,183,49,.2); color: #f7b731; animation: pulse 1.1s infinite; }
    .sync-pill.error   { background: rgba(233,69,96,.25); color: #e94560; }
    .sync-pill.offline { background: rgba(255,255,255,.12); color: rgba(255,255,255,.65); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
    .sdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .hdr-actions { display: flex; gap: 5px; flex-shrink: 0; }
    .hbtn {
      background: rgba(255,255,255,.16);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      padding: 6px 9px;
      font-size: 13px;
      font-weight: 600;
      transition: background .2s;
      white-space: nowrap;
      line-height: 1.2;
    }
    .hbtn:active { background: rgba(255,255,255,.32); }
    .hbtn.red   { background: rgba(233,69,96,.35); }
    .hbtn.icon  { font-size: 16px; padding: 5px 8px; }

    /* ============================================================
       AUTH STRIP
       ============================================================ */
    .auth-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      transition: background .25s;
    }
    .auth-strip-top {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .auth-strip-label { font-size: 13px; color: var(--text2); flex: 1; }
    .auth-chevron {
      font-size: 11px;
      color: var(--text2);
      transition: transform .25s;
    }
    .auth-chevron.open { transform: rotate(180deg); }
    .auth-form-wrap {
      overflow: hidden;
      max-height: 0;
      transition: max-height .3s ease;
    }
    .auth-form-wrap.open { max-height: 220px; }
    .auth-form-inner {
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .a-input {
      padding: 10px 13px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s;
    }
    .a-input:focus { border-color: var(--accent); }
    .a-input::placeholder { color: var(--text2); }
    .a-btn {
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .a-btn:disabled { opacity: .5; cursor: not-allowed; }
    .a-status {
      font-size: 12px;
      text-align: center;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      display: none;
    }
    .a-status.show    { display: block; }
    .a-status.success { background: rgba(78,204,163,.15); color: var(--success); }
    .a-status.error   { background: rgba(233,69,96,.15);  color: var(--error);   }
    .a-status.info    { background: rgba(80,150,230,.15); color: #60a8ff;         }

    /* ============================================================
       SCREENS CONTAINER
       ============================================================ */
    .screens {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform .35s cubic-bezier(.4,0,.2,1);
      will-change: transform;
      background: var(--bg);
    }
    /* Screen 1: Collections */
    #sCols                 { transform: translateX(0); }
    #sCols.slide-left      { transform: translateX(-30%); }
    /* Screen 2: Detail */
    #sDetail               { transform: translateX(100%); }
    #sDetail.slide-in      { transform: translateX(0); }

    .screen-body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 12px;
      padding-bottom: calc(88px + var(--sab));
    }

    /* ============================================================
       EMPTY STATE
       ============================================================ */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      gap: 10px;
      color: var(--text2);
      text-align: center;
      padding: 24px;
    }
    .empty-icon { font-size: 52px; opacity: .45; }
    .empty h3   { font-size: 16px; font-weight: 700; color: var(--text2); }
    .empty p    { font-size: 13px; }

    /* ============================================================
       COLLECTION CARDS
       ============================================================ */
    .cols-list { display: flex; flex-direction: column; gap: 11px; }
    .col-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .25s, border-color .25s;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .col-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
    }
    .col-card:active { transform: scale(.985); box-shadow: none; }
    .col-card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .col-info { flex: 1; min-width: 0; }
    .col-name {
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .col-desc {
      font-size: 12px;
      color: var(--text2);
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .col-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 7px;
    }
    .badge {
      background: var(--accent-soft);
      color: var(--accent);
      border-radius: 20px;
      padding: 2px 9px;
      font-size: 11px;
      font-weight: 700;
    }
    .col-actions { display: flex; gap: 1px; flex-shrink: 0; }
    .ico-btn {
      background: transparent;
      border: none;
      color: var(--text2);
      cursor: pointer;
      padding: 7px 8px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      transition: all .2s;
      line-height: 1;
    }
    .ico-btn:active { background: var(--surface2); color: var(--accent); }

    /* Items preview strip */
    .col-preview {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .prev-chip {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text2);
      overflow: hidden;
    }
    .prev-fav { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .prev-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .more-lbl { font-size: 11px; font-weight: 700; color: var(--accent); }

    /* ============================================================
       ITEM CARDS
       ============================================================ */
    .items-list { display: flex; flex-direction: column; gap: 11px; }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px;
      box-shadow: var(--shadow-sm);
      transition: background .25s, border-color .25s;
    }
    .item-top {
      display: flex;
      align-items: flex-start;
      gap: 11px;
    }
    .item-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .item-icon img {
      width: 28px; height: 28px;
      object-fit: contain;
    }
    .item-icon-fb { font-size: 22px; }
    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-url {
      font-size: 11px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }
    .item-note {
      font-size: 12px;
      color: var(--text2);
      margin-top: 5px;
      line-height: 1.45;
    }
    .item-actions { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
    .item-open {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-soft);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--accent);
      text-decoration: none;
      font-size: 16px;
      padding: 6px 8px;
      transition: background .2s;
      cursor: pointer;
    }
    .item-open:active { background: var(--surface3); }

    /* ============================================================
       MODALS (bottom sheet)
       ============================================================ */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: flex-end;
      justify-content: center;
      padding: 0 var(--sar) 0 var(--sal);
    }
    .modal.open { display: flex; }
    .modal-sheet {
      background: var(--surface);
      border-radius: 22px 22px 0 0;
      width: 100%;
      max-width: 680px;
      max-height: 88vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 20px 16px calc(18px + var(--sab));
      display: flex;
      flex-direction: column;
      gap: 15px;
      animation: sheetUp .3s cubic-bezier(.4,0,.2,1) both;
      transition: background .25s;
    }
    @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .modal-grab {
      width: 40px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: -8px auto 4px;
      flex-shrink: 0;
    }
    .modal-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-ttl { font-size: 18px; font-weight: 700; }
    .modal-x {
      background: var(--surface2);
      border: none;
      border-radius: 50%;
      color: var(--text2);
      cursor: pointer;
      width: 32px; height: 32px;
      font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .f-group { display: flex; flex-direction: column; gap: 7px; }
    .f-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .f-input {
      padding: 12px 14px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      -webkit-appearance: none;
      transition: border-color .2s, background .25s;
    }
    .f-input:focus { border-color: var(--accent); }
    .f-input::placeholder { color: var(--text2); }

    .url-row { position: relative; }
    .fetch-btn {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 11px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .fetch-btn:disabled { opacity: .5; }
    .fetch-hint {
      font-size: 11px;
      color: var(--text2);
      display: none;
      padding: 2px 0;
    }
    .fetch-hint.show { display: block; }

    .f-btns { display: flex; gap: 10px; margin-top: 2px; }
    .btn-ok {
      flex: 2;
      padding: 13px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-ok:active { opacity: .8; }
    .btn-ok:disabled { opacity: .5; cursor: not-allowed; }
    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--surface2);
      color: var(--text);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-cancel:active { background: var(--surface3); }

    /* ============================================================
       FAB
       ============================================================ */
    .fab {
      position: fixed;
      bottom: calc(22px + var(--sab));
      right: calc(18px + var(--sar));
      width: 58px; height: 58px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(233,69,96,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      transition: transform .18s, box-shadow .18s, opacity .2s;
    }
    .fab:active { transform: scale(.92); box-shadow: 0 2px 8px rgba(233,69,96,.3); }
    .fab.hidden { opacity: 0; pointer-events: none; transform: scale(.7); }

    /* ============================================================
       TOAST
       ============================================================ */
    .toast {
      position: fixed;
      bottom: calc(96px + var(--sab));
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s, transform .28s;
      white-space: nowrap;
      max-width: 82vw;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ============================================================
       SCROLL HELPERS
       ============================================================ */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="app-wrapper">

  <!-- ═══════════ HEADER ═══════════ -->
  <header class="app-header">
    <button class="hdr-back" id="backBtn">‹</button>
    <span class="hdr-title" id="hdrTitle">🗂️ MisColecciones</span>
    <div class="sync-pill offline" id="syncPill">
      <div class="sdot"></div>
      <span id="syncTxt">Local</span>
    </div>
    <div class="hdr-actions">
      <button class="hbtn icon" id="themeBtn" title="Cambiar tema">🌙</button>
      <button class="hbtn" id="exportBtn" title="Exportar">⬇️</button>
      <button class="hbtn" id="importBtn" title="Importar">⬆️</button>
      <button class="hbtn red" id="signOutBtn" style="display:none">Salir</button>
    </div>
  </header>
  <!-- USER EMAIL STRIP -->
  <div id="userEmailBar" style="display:none;background:rgba(78,204,163,.12);border-bottom:1px solid rgba(78,204,163,.2);padding:5px 14px;font-size:11px;color:#4ecca3;display:none;align-items:center;gap:6px;">
    <span>👤</span><span id="userEmailTxt"></span>
  </div>


  <!-- ═══════════ AUTH STRIP ═══════════ -->
  <div class="auth-strip" id="authStrip">
    <div class="auth-strip-top" id="authToggle">
      <span>☁️</span>
      <span class="auth-strip-label">Sincronizar en la nube</span>
      <span class="auth-chevron" id="authChevron">▼</span>
    </div>
    <div class="auth-form-wrap" id="authWrap">
      <div class="auth-form-inner">
        <input type="email"    class="a-input" id="emailInp"    placeholder="tu@email.com"  autocomplete="email"/>
        <input type="password" class="a-input" id="passInp"     placeholder="Contraseña"    autocomplete="current-password"/>
        <button class="a-btn"  id="signInBtn">Iniciar sesión / Registrarse</button>
        <div class="a-status"  id="authStatus"></div>
      </div>
    </div>
  </div>

  <!-- ═══════════ SCREENS ═══════════ -->
  <div class="screens">

    <!-- Screen 1: Colecciones -->
    <div class="screen" id="sCols">
      <div class="screen-body" id="sColsBody">
        <div class="cols-list" id="colsList">
          <div class="empty">
            <div class="empty-icon">📚</div>
            <h3>Sin colecciones aún</h3>
            <p>Presiona el botón + para crear tu primera colección</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Screen 2: Detalle de colección -->
    <div class="screen" id="sDetail">
      <div class="screen-body" id="sDetailBody">
        <div class="items-list" id="itemsList">
          <div class="empty">
            <div class="empty-icon">🔗</div>
            <h3>Sin páginas aún</h3>
            <p>Presiona + para agregar tu primera página web</p>
          </div>
        </div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ================================================================
   CONFIGURATION
   ================================================================ */
const SUPABASE_URL     = 'https://gqcfqzwyqgvpvxzvowcl.supabase.co';
const SUPABASE_ANON_KEY= 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdxY2Zxend5cWd2cHZ4enZvd2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3NjY1MTgsImV4cCI6MjA5ODM0MjUxOH0.QRM2bAjhPxW9ougxO0tFc04MaOu217mnl7_M4o6mbp8';

let db = null;
let rtChannel = null;

try {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true }
  });
  console.log('✅ Supabase client ready');
} catch(e) {
  console.error('❌ Supabase init failed:', e);
}

/* ================================================================
   STATE
   ================================================================ */
const S = {
  collections:   [],
  user:          null,
  useCloud:      false,
  view:          'collections',   // 'collections' | 'detail'
  currentColId:  null,
  editColId:     null,
  editItemId:    null,
  theme:         localStorage.getItem('mc_theme') || 'dark',
};

/* ================================================================
   THEME
   ================================================================ */
function applyTheme(t) {
  S.theme = t;
  document.documentElement.setAttribute('data-theme', t);
  $('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
  $('themeColorMeta').content = '#0f3460';
  localStorage.setItem('mc_theme', t);
}
$('themeBtn').addEventListener('click', () => applyTheme(S.theme === 'dark' ? 'light' : 'dark'));

/* ================================================================
   INIT
   ================================================================ */
async function init() {
  applyTheme(S.theme);
  await checkAuth();
  await loadCollections();
  bindEvents();
}

/* ================================================================
   AUTH
   ================================================================ */
async function checkAuth() {
  if (!db) return;
  try {
    const { data } = await db.auth.getSession();
    if (data?.session) {
      S.user = data.session.user;
      S.useCloud = true;
      updateAuthUI();
      subscribeRealtime();
    }
  } catch(e) { console.warn('checkAuth:', e); }
}

// Auth toggle accordion
$('authToggle').addEventListener('click', () => {
  const wrap = $('authWrap');
  const chev = $('authChevron');
  const open = wrap.classList.toggle('open');
  chev.classList.toggle('open', open);
});

$('signInBtn').addEventListener('click', async () => {
  const email = $('emailInp').value.trim();
  const pw    = $('passInp').value;
  if (!email || !pw) { showAuthMsg('Email y contraseña requeridos', 'error'); return; }
  if (!db)           { showAuthMsg('Sin conexión a la nube', 'error'); return; }

  const btn = $('signInBtn');
  btn.disabled = true; btn.textContent = 'Procesando...';
  showAuthMsg('Verificando...', 'info');

  try {
    let { data, error } = await db.auth.signInWithPassword({ email, password: pw });
    if (error) {
      // Try sign-up if credentials don't exist
      ({ data, error } = await db.auth.signUp({ email, password: pw }));
      if (error) throw error;
      if (!data.session) {
        showAuthMsg('✉️ Revisa tu email para confirmar la cuenta', 'success');
        return;
      }
    }
    if (data?.session) {
      S.user = data.session.user;
      S.useCloud = true;
      updateAuthUI();
      subscribeRealtime();
      await loadCollections();
      toast('✅ Sesión iniciada correctamente');
    }
  } catch(err) {
    showAuthMsg('Error: ' + (err.message || 'Intenta de nuevo'), 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Iniciar sesión / Registrarse';
  }
});

$('signOutBtn').addEventListener('click', async () => {
  if (db) await db.auth.signOut().catch(()=>{});
  if (rtChannel && db) db.removeChannel(rtChannel);
  S.user = null; S.useCloud = false;
  updateAuthUI();
  S.collections = [];
  navigateTo('collections');
  await loadCollections();
  toast('👋 Sesión cerrada');
});

function updateAuthUI() {
  const strip  = $('authStrip');
  const outBtn = $('signOutBtn');
  const emailBar = $('userEmailBar');
  const emailTxt = $('userEmailTxt');
  if (S.user) {
    strip.style.display  = 'none';
    outBtn.style.display = 'block';
    // Mostrar email del usuario logueado
    emailBar.style.display = 'flex';
    emailTxt.textContent   = S.user.email + '  (ID: ' + S.user.id.slice(0,8) + '...)';
    setSyncPill('synced');
    console.log('✅ Usuario logueado:', S.user.email, '| ID:', S.user.id);
  } else {
    strip.style.display    = '';
    outBtn.style.display   = 'none';
    emailBar.style.display = 'none';
    setSyncPill('offline');
  }
}

function showAuthMsg(msg, type) {
  const el = $('authStatus');
  el.textContent = msg;
  el.className = 'a-status show ' + type;
}

/* ================================================================
   REALTIME (Supabase)
   ================================================================ */
function subscribeRealtime() {
  if (!db || !S.user) return;
  if (rtChannel) db.removeChannel(rtChannel);
  rtChannel = db
    .channel('mc-rt-' + S.user.id)
    .on('postgres_changes', {
      event:  '*',
      schema: 'public',
      table:  'collections',
      filter: `user_id=eq.${S.user.id}`
    }, () => loadCollections(true))
    .subscribe(status => {
      if (status === 'SUBSCRIBED') console.log('✅ Realtime subscribed');
    });
}

/* ================================================================
   NAVIGATION
   ================================================================ */
function navigateTo(view, colId) {
  S.view = view;
  S.currentColId = colId || null;

  const scCols   = $('sCols');
  const scDetail = $('sDetail');
  const backBtn  = $('backBtn');
  const hdrTtl   = $('hdrTitle');

  if (view === 'detail') {
    const col = S.collections.find(c => c.id === colId);
    scCols.classList.add('slide-left');
    scDetail.classList.add('slide-in');
    backBtn.classList.add('show');
    hdrTtl.textContent = col ? col.name : 'Colección';
    renderItems(col);
    $('sDetailBody').scrollTop = 0;
  } else {
    scCols.classList.remove('slide-left');
    scDetail.classList.remove('slide-in');
    backBtn.classList.remove('show');
    hdrTtl.textContent = '🗂️ MisColecciones';
  }
}

/* ================================================================
   LOAD COLLECTIONS
   ================================================================ */
async function loadCollections(silent = false) {
  if (!silent) setSyncPill('syncing');
  try {
    if (S.useCloud && db) {
      const { data, error } = await db
        .from('collections')
        .select('*')
        .eq('user_id', S.user.id)
        .order('created_at', { ascending: false });
      if (error) throw error;
      S.collections = (data || []).map(normalizeCol);
      setSyncPill('synced');
    } else {
      const raw = localStorage.getItem('mis_colecciones');
      S.collections = raw ? JSON.parse(raw) : [];
      setSyncPill('offline');
    }
    renderCollections();
    if (S.view === 'detail' && S.currentColId) {
      renderItems(S.collections.find(c => c.id === S.currentColId));
    }
  } catch(err) {
    console.error('loadCollections:', err);
    setSyncPill('error');
    toast('Error al cargar: ' + err.message);
  }
}

function normalizeCol(c) {
  let items = c.items;
  if (!Array.isArray(items)) {
    try { items = JSON.parse(items || '[]'); } catch { items = []; }
  }
  return { ...c, items };
}

function saveLocal() {
  localStorage.setItem('mis_colecciones', JSON.stringify(S.collections));
}

/* ================================================================
   COLLECTIONS CRUD
   ================================================================ */
async function saveCollection() {
  const name = $('colName').value.trim();
  const desc = $('colDesc').value.trim();
  if (!name) { toast('El nombre es requerido'); return; }

  const btn = $('mColOk');
  btn.disabled = true; btn.textContent = 'Guardando...';
  setSyncPill('syncing');

  try {
    if (S.useCloud && db) {
      if (S.editColId) {
        const col = S.collections.find(c => c.id === S.editColId);
        const { error } = await db.from('collections')
          .update({ name, description: desc, items: col?.items || [], updated_at: new Date().toISOString() })
          .eq('id', S.editColId).eq('user_id', S.user.id);
        if (error) throw error;
      } else {
        const { error } = await db.from('collections')
          .insert([{ name, description: desc, user_id: S.user.id, items: [] }]);
        if (error) throw error;
      }
    } else {
      if (S.editColId) {
        const idx = S.collections.findIndex(c => c.id === S.editColId);
        if (idx >= 0) S.collections[idx] = { ...S.collections[idx], name, description: desc };
      } else {
        S.collections.unshift({
          id: 'col_' + Date.now(), name, description: desc,
          items: [], created_at: new Date().toISOString()
        });
      }
      saveLocal();
    }
    closeModal('mCol');
    await loadCollections();
    toast(S.editColId ? '✅ Colección actualizada' : '✅ Colección creada');
  } catch(err) {
    toast('Error: ' + err.message);
    setSyncPill('error');
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar';
    S.editColId = null;
  }
}

window.openCol = colId => navigateTo('detail', colId);

window.editCol = (colId, e) => {
  e?.stopPropagation();
  const col = S.collections.find(c => c.id === colId);
  if (!col) return;
  S.editColId = colId;
  $('colName').value = col.name || '';
  $('colDesc').value = col.description || '';
  $('mColTtl').textContent = 'Editar colección';
  openModal('mCol');
};

window.delCol = async (colId, e) => {
  e?.stopPropagation();
  if (!confirm('¿Eliminar esta colección y todos sus contenidos?')) return;
  setSyncPill('syncing');
  try {
    if (S.useCloud && db) {
      const { error } = await db.from('collections')
        .delete().eq('id', colId).eq('user_id', S.user.id);
      if (error) throw error;
    } else {
      S.collections = S.collections.filter(c => c.id !== colId);
      saveLocal();
    }
    setSyncPill('synced');
    if (S.currentColId === colId) navigateTo('collections');
    await loadCollections();
    toast('🗑️ Colección eliminada');
  } catch(err) {
    toast('Error: ' + err.message);
    setSyncPill('error');
  }
};

/* ================================================================
   ITEMS CRUD
   ================================================================ */
async function saveItem() {
  let url   = $('itemUrl').value.trim();
  const ttl = $('itemTitle').value.trim();
  const note= $('itemNote').value.trim();
  if (!url) { toast('La URL es requerida'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const btn = $('mItemOk');
  btn.disabled = true; btn.textContent = 'Guardando...';

  try {
    const col = S.collections.find(c => c.id === S.currentColId);
    if (!col) throw new Error('Colección no encontrada');

    let domain = '';
    try { domain = new URL(url).hostname; } catch {}
    const favicon = domain ? `https://www.google.com/s2/favicons?sz=64&domain=${domain}` : '';

    if (!col.items) col.items = [];

    if (S.editItemId) {
      const idx = col.items.findIndex(i => i.id === S.editItemId);
      if (idx >= 0) col.items[idx] = { ...col.items[idx], url, title: ttl || domain || url, note, favicon };
    } else {
      col.items.unshift({
        id: 'item_' + Date.now(),
        url, title: ttl || domain || url, note, favicon,
        saved_at: new Date().toISOString()
      });
    }

    await persistItems(col);
    closeModal('mItem');
    renderItems(col);
    toast(S.editItemId ? '✅ Página actualizada' : '✅ Página guardada');
  } catch(err) {
    toast('Error: ' + err.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Guardar';
    S.editItemId = null;
  }
}

async function persistItems(col) {
  if (S.useCloud && db) {
    setSyncPill('syncing');
    const { error } = await db.from('collections')
      .update({ items: col.items, updated_at: new Date().toISOString() })
      .eq('id', col.id).eq('user_id', S.user.id);
    if (error) throw error;
    setSyncPill('synced');
  } else {
    saveLocal();
  }
}

window.editItem = itemId => {
  const col  = S.collections.find(c => c.id === S.currentColId);
  const item = (col?.items || []).find(i => i.id === itemId);
  if (!item) return;
  S.editItemId = itemId;
  $('itemUrl').value   = item.url   || '';
  $('itemTitle').value = item.title || '';
  $('itemNote').value  = item.note  || '';
  $('mItemTtl').textContent = 'Editar página';
  openModal('mItem');
};

window.delItem = async itemId => {
  if (!confirm('¿Eliminar esta página de la colección?')) return;
  const col = S.collections.find(c => c.id === S.currentColId);
  if (!col) return;
  col.items = (col.items || []).filter(i => i.id !== itemId);
  await persistItems(col);
  renderItems(col);
  toast('🗑️ Página eliminada');
};

/* ================================================================
   URL METADATA FETCH (microlink.io)
   ================================================================ */
$('fetchBtn').addEventListener('click', async () => {
  let url = $('itemUrl').value.trim();
  if (!url) { toast('Escribe una URL primero'); return; }
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  const btn  = $('fetchBtn');
  const hint = $('fetchHint');
  btn.disabled = true;
  hint.textContent = '⏳ Obteniendo datos...';
  hint.className = 'fetch-hint show';

  try {
    const res  = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&palette=false&audio=false&video=false&screenshot=false`);
    const json = await res.json();
    if (json.status === 'success' && json.data?.title) {
      $('itemTitle').value = json.data.title;
      hint.textContent = '✅ Título obtenido automáticamente';
    } else {
      hint.textContent = 'No se encontró título automáticamente';
    }
  } catch {
    hint.textContent = '⚠️ Sin acceso para obtener título';
  } finally {
    btn.disabled = false;
    setTimeout(() => { hint.className = 'fetch-hint'; }, 3500);
  }
});

$('itemUrl').addEventListener('keydown', e => { if (e.key === 'Enter') $('fetchBtn').click(); });

/* ================================================================
   RENDER COLLECTIONS
   ================================================================ */
function renderCollections() {
  const list = $('colsList');
  if (!S.collections.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">📚</div>
      <h3>Sin colecciones aún</h3>
      <p>Presiona el botón + para crear tu primera colección</p>
    </div>`;
    return;
  }

  list.innerHTML = S.collections.map(col => {
    const items = col.items || [];
    const cnt = items.length;
    const prev = items.slice(0, 3).map(it => `
      <div class="prev-chip">
        ${it.favicon ? `<img src="${esc(it.favicon)}" class="prev-fav" onerror="this.style.display='none'">` : '🔗'}
        <span class="prev-title">${esc(it.title || it.url || '')}</span>
      </div>`).join('');

    return `<div class="col-card" onclick="window.openCol('${col.id}')">
      <div class="col-card-top">
        <div class="col-info">
          <div class="col-name">${esc(col.name)}</div>
          ${col.description ? `<div class="col-desc">${esc(col.description)}</div>` : ''}
          <div class="col-meta">
            <span class="badge">${cnt} ${cnt === 1 ? 'página' : 'páginas'}</span>
          </div>
        </div>
        <div class="col-actions">
          <button class="ico-btn" onclick="window.editCol('${col.id}',event)">✏️</button>
          <button class="ico-btn" onclick="window.delCol('${col.id}',event)">🗑️</button>
        </div>
      </div>
      ${prev ? `<div class="col-preview">${prev}${cnt > 3 ? `<div class="more-lbl">+${cnt-3} más</div>` : ''}</div>` : ''}
    </div>`;
  }).join('');
}

/* ================================================================
   RENDER ITEMS
   ================================================================ */
function renderItems(col) {
  const list = $('itemsList');
  if (!col) { list.innerHTML = ''; return; }
  const items = col.items || [];

  if (!items.length) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">🔗</div>
      <h3>Sin páginas aún</h3>
      <p>Presiona + para agregar tu primera página web</p>
    </div>`;
    return;
  }

  list.innerHTML = items.map(it => `
    <div class="item-card">
      <div class="item-top">
        <div class="item-icon">
          ${it.favicon
            ? `<img src="${esc(it.favicon)}" onerror="this.parentElement.innerHTML='<span class=item-icon-fb>🔗</span>'">`
            : '<span class="item-icon-fb">🔗</span>'}
        </div>
        <div class="item-body">
          <div class="item-title">${esc(it.title || 'Sin título')}</div>
          <div class="item-url">${esc(it.url || '')}</div>
          ${it.note ? `<div class="item-note">${esc(it.note)}</div>` : ''}
        </div>
        <div class="item-actions">
          <a href="${esc(it.url)}" target="_blank" rel="noopener noreferrer" class="item-open">↗️</a>
          <button class="ico-btn" onclick="window.editItem('${it.id}')">✏️</button>
          <button class="ico-btn" onclick="window.delItem('${it.id}')">🗑️</button>
        </div>
      </div>
    </div>
  `).join('');
}

/* ================================================================
   MODAL HELPERS
   ================================================================ */
function openModal(id) { $(id).classList.add('open'); }
function closeModal(id) {
  $(id).classList.remove('open');
  if (id === 'mCol') {
    $('colName').value = ''; $('colDesc').value = '';
    $('mColTtl').textContent = 'Nueva colección';
    S.editColId = null;
  }
  if (id === 'mItem') {
    $('itemUrl').value = ''; $('itemTitle').value = ''; $('itemNote').value = '';
    $('fetchHint').className = 'fetch-hint';
    $('mItemTtl').textContent = 'Agregar página';
    S.editItemId = null;
  }
}

/* ================================================================
   SYNC PILL
   ================================================================ */
function setSyncPill(status) {
  const pill = $('syncPill');
  const txt  = $('syncTxt');
  pill.className = 'sync-pill ' + status;
  txt.textContent = { synced:'✓ Nube', syncing:'⟳ Sync...', error:'✗ Error', offline:'Local' }[status] || status;
}

/* ================================================================
   TOAST
   ================================================================ */
let toastTmr;
function toast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ================================================================
   EXPORT / IMPORT
   ================================================================ */
function exportData() {
  const blob = new Blob([JSON.stringify({
    version: 2, exportDate: new Date().toISOString(), collections: S.collections
  }, null, 2)], { type: 'application/json' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: 'colecciones-' + Date.now() + '.json'
  });
  a.click();
  URL.revokeObjectURL(a.href);
}

$('importFile').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async evt => {
    try {
      const data = JSON.parse(evt.target.result);
      if (!Array.isArray(data.collections)) throw new Error('Formato inválido');
      const existing = new Set(S.collections.map(c => c.id));
      const newCols  = data.collections.filter(c => !existing.has(c.id));
      if (S.useCloud && db) {
        for (const col of newCols) {
          await db.from('collections').insert([{ ...col, user_id: S.user.id }]);
        }
      } else {
        S.collections.push(...newCols);
        saveLocal();
      }
      await loadCollections();
      toast(`✅ ${newCols.length} colecciones importadas`);
    } catch(err) { toast('Error al importar: ' + err.message); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ================================================================
   EVENT BINDING
   ================================================================ */
function bindEvents() {
  // Back
  $('backBtn').addEventListener('click', () => navigateTo('collections'));

  // FAB
  $('fabBtn').addEventListener('click', () => {
    if (S.view === 'detail') {
      S.editItemId = null;
      $('mItemTtl').textContent = 'Agregar página';
      openModal('mItem');
    } else {
      S.editColId = null;
      $('mColTtl').textContent = 'Nueva colección';
      openModal('mCol');
    }
  });

  // Collection modal
  $('mColOk').addEventListener('click', saveCollection);
  $('mColCancel').addEventListener('click', () => closeModal('mCol'));
  $('mColX').addEventListener('click', () => closeModal('mCol'));
  $('mCol').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('mCol'); });

  // Item modal
  $('mItemOk').addEventListener('click', saveItem);
  $('mItemCancel').addEventListener('click', () => closeModal('mItem'));
  $('mItemX').addEventListener('click', () => closeModal('mItem'));
  $('mItem').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal('mItem'); });

  // Header actions
  $('exportBtn').addEventListener('click', exportData);
  $('importBtn').addEventListener('click', () => $('importFile').click());

  // Swipe right to go back (iOS style)
  let touchStartX = 0;
  $('sDetail').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  $('sDetail').addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (dx > 80 && touchStartX < 40) navigateTo('collections');
  }, { passive: true });
}

/* ================================================================
   UTILS
   ================================================================ */
function $(id) { return document.getElementById(id); }
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}

/* ================================================================
   START
   ================================================================ */
init();
</script>

<!-- Service Worker -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(r => console.log('✅ SW registered, scope:', r.scope))
      .catch(e => console.warn('SW registration failed:', e));
  });
}
</script>
